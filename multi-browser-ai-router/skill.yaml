---
# skill.yaml — OpenClaw Skill 配置
# 放置于 <workspace>/skills/multi-ai-router/ 目录

name: multi-ai-router
version: "1.0.0"
description: >
  将用户的问题路由到 ChatGPT、Gemini、Grok、Perplexity、Claude 等 AI 的
  网页端免费版本。自动管理登录 session，首次手动登录后永久保持登录状态。

triggers:
  - pattern: "用 (chatgpt|gemini|grok|perplexity|claude) (.+)"
    action: route_to_ai
  - pattern: "/ai (\\w+) (.+)"
    action: route_to_ai
  - pattern: "让 (ChatGPT|Gemini|Grok) (.+)"
    action: route_to_ai

tools:
  - browser  # 需要 OpenClaw browser 工具

# Agent 系统提示（嵌入到当前 agent）
agent_prompt: |
  你是一个多 AI 平台路由助手。当用户要求使用特定 AI 平台回答问题时，你需要：
  
  1. **识别目标平台**
     从用户消息中提取平台名称，支持别名：
     - "ChatGPT" / "GPT" / "openai" → chatgpt
     - "Gemini" / "Google AI" / "谷歌" → gemini  
     - "Grok" / "X AI" / "马斯克AI" → grok
     - "Perplexity" / "搜索AI" → perplexity
     - "Claude" / "Anthropic" → claude
  
  2. **检查 Session 状态**
     ```bash
     ls ~/.openclaw/ai-sessions/<platform>.json
     ```
     - 存在 → 加载并继续
     - 不存在 → 告知用户需要首次登录
  
  3. **执行浏览器操作**（按 SKILL.md 中的流程）
     - 加载 session → 打开平台 → 验证登录 → 输入问题 → 等待回复 → 提取结果
  
  4. **返回格式**
     ```
     ─────────────────────────────
     📡 来自 [平台名称]
     ─────────────────────────────
     [AI 回复内容]
     ─────────────────────────────
     ```
  
  5. **Session 管理规则**
     - 永远不存储明文密码
     - 只存储 Cookie / localStorage (state 文件)
     - Session 过期时通知用户手动刷新
     - 文件权限保持 600（仅所有者可读）
  
  6. **故障处理优先级**
     Session 过期 → 提示重新登录
     元素未找到 → 重新 snapshot 后重试
     回复超时 → 返回已获取内容并提示
     平台不可用 → 建议切换到其他平台

# 快捷命令定义
commands:
  /ai:
    description: "路由到指定 AI 平台"
    usage: "/ai <platform> <question>"
    example: "/ai gemini 解释量子纠缠"
  
  /ai-status:
    description: "查看各平台 session 状态"
    action: |
      检查 ~/.openclaw/ai-sessions/ 下的所有 .json 文件
      输出各平台的登录状态（文件存在=已登录，不存在=未登录）
  
  /ai-login:
    description: "手动刷新某平台的登录"
    usage: "/ai-login <platform>"
    action: |
      1. 打开平台登录页
      2. 等待用户完成登录
      3. 保存新 session

# 备用平台顺序（当首选平台不可用时）
fallback_order:
  - gemini
  - perplexity
  - chatgpt
  - grok
  - claude
